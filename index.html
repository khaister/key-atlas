<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Tools — Reference Library</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --ink: #1a1208;
    --gold: #c9922a;
    --paper: #ede8dc;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--ink);
    min-height: 100vh;
    font-family: 'Space Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(201,146,42,0.1) 0%, transparent 70%);
  }
  header { text-align: center; margin-bottom: 60px; }
  header .eyebrow { font-size: 12px; letter-spacing: 0.4em; color: var(--gold); text-transform: uppercase; margin-bottom: 15px; }
  header h1 { font-family: 'Playfair Display', serif; font-size: clamp(40px, 6vw, 64px); font-weight: 900; color: var(--cream); line-height: 1.1; letter-spacing: -0.01em; }

  .nav-container { width: 100%; max-width: 800px; }
  .section-header { display: flex; align-items: center; gap: 16px; margin-bottom: 30px; }
  .section-header h2 { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--cream); white-space: nowrap; }
  .section-header .line { flex: 1; height: 1px; background: rgba(245,240,232,0.15); }

  .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
  .link-card {
    background: rgba(245,240,232,0.03);
    border: 1px solid rgba(245,240,232,0.1);
    border-radius: 12px;
    padding: 24px;
    text-decoration: none;
    transition: all 0.3s ease;
    display: block;
  }
  .link-card:hover {
    background: rgba(245,240,232,0.06);
    border-color: var(--gold);
    transform: translateY(-2px);
  }
  .link-card .key-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .link-card .key-meta {
    font-size: 12px;
    color: rgba(245,240,232,0.4);
    letter-spacing: 0.1em;
  }
  .sharp-count {
    font-size: 11px;
    padding: 4px 8px;
    background: rgba(201,146,42,0.15);
    border-radius: 4px;
    color: var(--gold);
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Interactive Reference</div>
  <h1>Music <span>Tools</span></h1>
</header>

<div class="nav-container">
  <div class="section-header">
    <h2>Major Keys</h2>
    <div class="line"></div>
  </div>

  <div class="link-grid">
    <a href="e-major-4sharps.html" class="link-card">
      <div class="key-title">
        E Major
        <span class="sharp-count">4 Sharps</span>
      </div>
      <div class="key-meta">F♯ · C♯ · G♯ · D♯</div>
    </a>
  </div>
</div>

</body>
</html>
